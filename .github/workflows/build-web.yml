name: Build Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type Check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build Web
        run: npm run build

      - name: Test
        run: npm run test
