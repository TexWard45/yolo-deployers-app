name: Build Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type Check
        run: npx turbo type-check --filter=@app/web...

      - name: Lint
        run: npx turbo lint --filter=@app/web...

      - name: Build Web
        run: npm run build --workspace @app/web

      - name: Unit Tests (Web)
        run: npm run test -w @app/web
