name: Build Codex

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-codex:
    name: Build Codex
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type Check
        run: npx turbo type-check --filter=@app/codex...

      - name: Lint
        run: npx turbo lint --filter=@app/codex...

      - name: Build Codex
        run: npm run build --workspace @app/codex
