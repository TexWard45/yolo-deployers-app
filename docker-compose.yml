name: template-project

services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data

  temporal:
    image: temporalio/temporal:latest
    command: server start-dev --ip 0.0.0.0 --ui-ip 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "7233:7233"
      - "8233:8233"

  queue:
    build:
      context: .
      dockerfile: apps/queue/Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/mydb?schema=public
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: resolveai-support-queue
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL_DEFAULT: ${LLM_MODEL_DEFAULT:-claude-sonnet-4-20250514}
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_started

volumes:
  pgdata:
